volumes:
  kestra_data:
  postgres_data:
  minio_data:

networks:
  data_pipeline_net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine # Alpine is lighter for your i5
    container_name: postgres
    networks:
      - data_pipeline_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kestra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - data_pipeline_net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  ingestion_image_builder:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN apt-get update && apt-get install -y curl && rm -rf /var/lib/apt/lists/*
        RUN pip install --no-cache-dir "dlt[s3,parquet,motherduck]" requests beautifulsoup4 playwright minio pandas duckdb==1.1.4 boto3 pyarrow
        RUN playwright install chromium --with-deps
        WORKDIR /app
    image: pc-pipeline-ingestion:latest
    networks:
      - data_pipeline_net

  kestra:
    image: kestra/kestra:latest
    container_name: kestra
    pull_policy: always
    user: "root"
    command: server standalone
    networks:
      - data_pipeline_net
    depends_on:
      postgres:
        condition: service_healthy
      ingestion_image_builder:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      # THE CRITICAL FIX: The ':z' label tells SELinux to allow access to the socket
      - /var/run/docker.sock:/var/run/docker.sock:z 
      - kestra_data:/app/storage
      - ./scripts:/app/scripts
    environment:
      JAVA_OPTS: "-Xmx2g" 
      # Pass these so Kestra can pass them to the Python containers
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      KESTRA_CONFIGURATION: |
        kestra:
          server:
            # Fixes the BindException: Permission Denied on some Linux kernels
            port: 8080 
          tasks:
            scripts:
              docker:
                # This ensures spawned containers can talk to Minio by name
                network: data_pipeline_net 
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            username: ${POSTGRES_USER}
            password: ${POSTGRES_PASSWORD}
            driverClassName: org.postgresql.Driver